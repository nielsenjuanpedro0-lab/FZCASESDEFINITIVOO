<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Admin FZCASES</title>
    <meta name="description" content="Acceso al panel de administración de FZCASES">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- Archivos CSS -->
    <link rel="stylesheet" href="/admin/admin.css">
</head>

<body class="admin-login-body">

    <div class="login-container fade-in-up">

        <div class="login-header">
            <h1>FZCASES</h1>
            <h2>Panel Admin</h2>
            <p>Ingresá para gestionar productos</p>
        </div>

        <!-- Alerta de Error Oculta -->
        <div id="error-message" class="error-alert">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" class="alert-icon">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span>Usuario o contraseña incorrectos</span>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Usuario</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="input-icon">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <input type="text" id="username" name="username" placeholder="admin" required autofocus
                        autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="input-icon">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input type="password" id="password" name="password" placeholder="••••••••" required
                        autocomplete="current-password">
                    <button type="button" id="toggle-password" class="toggle-password-btn"
                        aria-label="Mostrar contraseña">
                        <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-extras">
                <label class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <span>Recordarme</span>
                </label>
            </div>

            <button type="submit" id="btn-login" class="btn btn-primary btn-block">
                <span class="btn-text">Ingresar al Panel</span>
                <span class="btn-spinner" style="display: none;"></span>
            </button>
        </form>

        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>

    </div>

    <!-- Script de Autenticación -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // TODO: Conectar con Supabase Auth más adelante
            const validUser = "admin";
            const validPass = "fzcases2024";

            const loginForm = document.getElementById('login-form');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const btnLogin = document.getElementById('btn-login');
            const btnText = btnLogin.querySelector('.btn-text');
            const btnSpinner = btnLogin.querySelector('.btn-spinner');
            const errorMessage = document.getElementById('error-message');
            const loginContainer = document.querySelector('.login-container');
            const togglePasswordBtn = document.getElementById('toggle-password');
            const eyeIcon = togglePasswordBtn.querySelector('.eye-icon');
            const rememberCheckbox = document.getElementById('remember');

            // Recordar usuario base localStorage
            if (localStorage.getItem('fzcases_remember_user')) {
                usernameInput.value = localStorage.getItem('fzcases_remember_user');
                rememberCheckbox.checked = true;
            }

            // Mostrar/Ocultar contraseña
            togglePasswordBtn.addEventListener('click', () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';

                if (isPassword) {
                    eyeIcon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>`;
                } else {
                    eyeIcon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
                }
            });

            // Login Submit
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const userVal = usernameInput.value.trim();
                const passVal = passwordInput.value.trim();

                if (!userVal || !passVal) return;

                // Loading State
                btnLogin.disabled = true;
                btnLogin.classList.add('loading');
                btnText.textContent = "Verificando...";
                btnSpinner.style.display = "inline-block";
                errorMessage.style.display = 'none';

                // Simular red (delay)
                setTimeout(() => {
                    if (userVal === validUser && passVal === validPass) {
                        // Éxito
                        localStorage.setItem('admin_logged', 'true');
                        localStorage.setItem('fzcasesAuthTimestamp', Date.now());

                        if (rememberCheckbox.checked) {
                            localStorage.setItem('fzcases_remember_user', userVal);
                        } else {
                            localStorage.removeItem('fzcases_remember_user');
                        }

                        btnText.textContent = "¡Acceso Exitoso!";
                        btnSpinner.style.display = "none";
                        btnLogin.style.background = "var(--admin-success)";

                        setTimeout(() => {
                            window.location.href = "/admin/dashboard.html";
                        }, 500);

                    } else {
                        // Fracaso
                        btnLogin.disabled = false;
                        btnLogin.classList.remove('loading');
                        btnText.textContent = "Ingresar al Panel";
                        btnSpinner.style.display = "none";

                        // Show Error
                        errorMessage.style.display = 'flex';
                        errorMessage.classList.add('fade-in');

                        // Shake card
                        loginContainer.classList.add('shake');
                        setTimeout(() => loginContainer.classList.remove('shake'), 500);

                        // Clear pass
                        passwordInput.value = "";
                        passwordInput.focus();
                    }
                }, 1200); // 1.2s de simulación segura de red
            });
        });
    </script>
</body>

</html>
